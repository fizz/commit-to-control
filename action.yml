name: 'Commit to Control'
description: 'Map git commits to NIST 800-171 controls via vector similarity + LLM judge. Shows which compliance controls each PR addresses.'
author: 'fizz'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  provider:
    description: 'AI provider: "openai" (also Ollama, vLLM) or "bedrock"'
    required: false
    default: 'openai'
  embed-model:
    description: 'Embedding model ID (provider-specific)'
    required: false
  judge-model:
    description: 'Judge/chat model ID (provider-specific)'
    required: false
  database-url:
    description: 'PostgreSQL connection string (must have pgvector extension)'
    required: true
  top-k:
    description: 'Number of candidate controls to retrieve before judging'
    required: false
    default: '8'
  post-comment:
    description: 'Post results as a PR comment (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: |
        pip install --quiet psycopg2-binary openpyxl
        if [ "${{ inputs.provider }}" = "bedrock" ]; then
          pip install --quiet boto3
        else
          pip install --quiet openai
        fi

    - name: Generate controls.json
      shell: bash
      run: make -C ${{ github.action_path }} controls

    - name: Seed controls (if needed)
      shell: bash
      env:
        COMMIT2CONTROL_DB: ${{ inputs.database-url }}
        COMMIT2CONTROL_PROVIDER: ${{ inputs.provider }}
      run: |
        [ -n "${{ inputs.embed-model }}" ] && export EMBED_MODEL="${{ inputs.embed-model }}" || true
        [ -n "${{ inputs.judge-model }}" ] && export JUDGE_MODEL="${{ inputs.judge-model }}" || true
        STATUS=$(python ${{ github.action_path }}/commit-to-control --provider ${{ inputs.provider }} --status 2>&1) || true
        echo "$STATUS"
        if ! echo "$STATUS" | grep -qE "Controls seeded: [1-9]"; then
          python ${{ github.action_path }}/commit-to-control --provider ${{ inputs.provider }} --seed
        fi

    - name: Get PR diff commits
      shell: bash
      id: commits
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          COMMITS=$(git log --format='%H' ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
        else
          COMMITS="${{ github.sha }}"
        fi
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Map commits to controls
      shell: bash
      id: mapping
      env:
        COMMIT2CONTROL_DB: ${{ inputs.database-url }}
        COMMIT2CONTROL_PROVIDER: ${{ inputs.provider }}
      run: |
        [ -n "${{ inputs.embed-model }}" ] && export EMBED_MODEL="${{ inputs.embed-model }}" || true
        [ -n "${{ inputs.judge-model }}" ] && export JUDGE_MODEL="${{ inputs.judge-model }}" || true

        COMMITS="${{ steps.commits.outputs.commits }}"
        OUTFILE=/tmp/control-mapping.txt
        > "$OUTFILE"

        while IFS= read -r sha; do
          [ -z "$sha" ] && continue
          echo "::group::Mapping commit $sha"
          python ${{ github.action_path }}/commit-to-control \
            --provider ${{ inputs.provider }} \
            --top ${{ inputs.top-k }} \
            "$sha" | tee -a "$OUTFILE"
          echo -e "\n\n---\n" >> "$OUTFILE"
          echo "::endgroup::"
        done <<< "$COMMITS"

        echo "--- Full output ---"
        cat "$OUTFILE"

    - name: Generate PR summary
      shell: bash
      run: |
        # Extract all RELEVANT controls across all commits, deduplicate
        SUMMARY=$(grep '✓' /tmp/control-mapping.txt | sed 's/.*✓ //' | sort -u)
        # Extract total cost across all commits
        TOTAL_COST=$(grep '^ *Total' /tmp/control-mapping.txt | awk '{sum += $NF} END {printf "$%.6f", sum}')
        [ -z "$TOTAL_COST" ] && TOTAL_COST='$0.000000'

        echo "## Controls addressed by this PR" > /tmp/control-summary.txt
        echo "" >> /tmp/control-summary.txt
        if [ -n "$SUMMARY" ]; then
          echo "$SUMMARY" | while IFS= read -r line; do
            echo "✓ $line" >> /tmp/control-summary.txt
          done
        else
          echo "No NIST 800-171 controls identified in this PR." >> /tmp/control-summary.txt
        fi
        echo "" >> /tmp/control-summary.txt
        echo "**Cost:** ${TOTAL_COST}" >> /tmp/control-summary.txt
        echo ""
        echo "--- PR Summary ---"
        cat /tmp/control-summary.txt

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const mapping = fs.readFileSync('/tmp/control-mapping.txt', 'utf8');
          const summary = fs.readFileSync('/tmp/control-summary.txt', 'utf8');

          const marker = '<!-- commit-to-control -->';
          const body = `${marker}\n${summary}\n\n<details>\n<summary>Per-commit details</summary>\n\n\`\`\`\n${mapping}\n\`\`\`\n</details>\n`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }
